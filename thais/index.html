<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV ACADEMY</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div>
            <img class="logo" src="./imagens/logo.jpeg" alt="logo"> <!--src - caminho img, alt- descrição da img-->
        </div>

        <div class="links">
            <a href="">INÍCIO</a> <!--a - link para outra página, href- caminho-->
            <a href="">CURSOS</a>
            <a href="">CONTATO</a>
        </div>
    </header>

    <main>
        <div>
            <img class="img-main" src="./imagens/main.jpeg" alt="homem carregando veículo">
        </div>
        <div class="paragrafo">
            <h1>Aprenda a instalar carregadores para veículos elétricos</h1>
            <p>Curso online para eletricistas, engenheiros e profissionais que querem entrar no mercado de mobilidade
                elétrica.</p>
        </div>

        <div class="form">
            <div id="forms">
                <form action="">
                    <h3>Recebe informações:</h3>
                    <input type="text" name="" id="" placeholder="Nome">
                    <input type="email" name="" id="" placeholder="Email">
                    <input type="tel" name="" id="" placeholder="Telefone">
                    <div class="button">
                        <input type="button" value="Quero receber informações">
                    </div>
            </div>
            </form>
        </div>
    </main>

    <footer>
        <img class="logo" src="./imagens/logo.jpeg" alt="logo">
        <div>
            <a href="" class="rodape">contato@evacademy</a>
        </div>
    </footer>
</body>

</html>
